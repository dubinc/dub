name: OpenAPI Diff

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/lib/openapi/**"
      - "apps/web/lib/zod/**"
      - "packages/**"
      - ".github/workflows/openapi-diff.yaml"

concurrency:
  group: openapi-diff-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  openapi-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Generate spec from PR branch
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Install dependencies (PR)
        run: pnpm install

      - name: Build packages (PR)
        run: pnpm --filter @dub/utils --filter @dub/blocks build

      - name: Generate OpenAPI spec (PR)
        run: pnpm --filter web generate-openapi

      - name: Save PR spec
        run: cp apps/web/openapi.json /tmp/pr-openapi.json

      # Generate spec from main branch
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install dependencies (main)
        run: pnpm install

      - name: Build packages (main)
        run: pnpm --filter @dub/utils --filter @dub/blocks build

      - name: Generate OpenAPI spec (main)
        run: pnpm --filter web generate-openapi

      - name: Save main spec
        run: cp apps/web/openapi.json /tmp/main-openapi.json

      # Diff the two specs
      - name: Install oasdiff
        env:
          OASDIFF_VERSION: "1.13.1"
        run: |
          curl -sSfL "https://github.com/Tufin/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" -o oasdiff.tar.gz
          tar -xzf oasdiff.tar.gz -C /usr/local/bin oasdiff
          rm oasdiff.tar.gz

      - name: Run oasdiff changelog
        id: diff
        run: |
          DIFF_OUTPUT=$(oasdiff changelog /tmp/main-openapi.json /tmp/pr-openapi.json 2>&1) || true

          if [ -z "$DIFF_OUTPUT" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "diff_output=No OpenAPI changes detected." >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            DELIMITER="DIFF_$(uuidgen)"
            {
              echo "diff_output<<$DELIMITER"
              echo "$DIFF_OUTPUT"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Run oasdiff breaking
        id: breaking
        run: |
          BREAKING_OUTPUT=$(oasdiff breaking /tmp/main-openapi.json /tmp/pr-openapi.json 2>&1) || true

          if [ -z "$BREAKING_OUTPUT" ]; then
            echo "has_breaking=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_breaking=true" >> "$GITHUB_OUTPUT"
            DELIMITER="BREAKING_$(uuidgen)"
            {
              echo "breaking_output<<$DELIMITER"
              echo "$BREAKING_OUTPUT"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          fi

      # Post PR comment
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- openapi-diff -->

      - name: Delete stale comment
        if: steps.diff.outputs.has_changes == 'false' && steps.find-comment.outputs.comment-id != ''
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
        with:
          script: |
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: process.env.COMMENT_ID,
            });

      - name: Post or update comment (with changes)
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- openapi-diff -->
            ## OpenAPI Diff

            ${{ steps.breaking.outputs.has_breaking == 'true' && '⚠️ **Breaking changes detected!**' || '✅ No breaking changes.' }}

            <details><summary>Changelog</summary>

            ```
            ${{ steps.diff.outputs.diff_output }}
            ```

            </details>

            ${{ steps.breaking.outputs.has_breaking == 'true' && format('<details><summary>Breaking Changes</summary>

            ```
            {0}
            ```

            </details>', steps.breaking.outputs.breaking_output) || '' }}
